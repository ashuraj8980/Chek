<div style="text-align: center; margin-top: 20px;">
    <button id="direct-pay-now" style="background: #3399cc; color: #fff; padding: 12px 25px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: 600;">
        Pay Now
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    document.getElementById('direct-pay-now').onclick = function(e) {
        var options = {
            "key": "YOUR_KEY_ID_HERE", // 👈 Yahan apni API Key dalein (rzp_test_...)
            "amount": "10000", // Amount paise mein (10000 = ₹100)
            "currency": "INR",
            "name": "RealMeet",
            "description": "Fast Payment",
            
            // Ye part details mangna band kar dega (Skip Step)
            "prefill": {
                "name": "Customer", 
                "email": "customer@example.com",
                "contact": "9999999999"
            },
            
            "theme": { "color": "#3399cc" },
            
            "handler": function (response) {
                alert("Payment Successful! ID: " + response.razorpay_payment_id);
            }
        };

        var rzp1 = new Razorpay(options);
        rzp1.open();
        e.preventDefault();
    };
</script>
