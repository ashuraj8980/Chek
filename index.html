<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Check - RealMeet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .payment-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="payment-card">
        <h2>Pay & Connect</h2>
        <p>Click the button below to test your Razorpay integration.</p>

        <form>
            <script 
                src="https://checkout.razorpay.com/v1/payment-button.js" 
                data-payment_button_id="pl_SfnTnRnMq2ntKw" 
                async>
            </script> 
        </form>

        <div style="margin-top: 20px; font-size: 12px; color: #999;">
            Note: User details will be required for this button.
        </div>
    </div>

</body>
</html>
